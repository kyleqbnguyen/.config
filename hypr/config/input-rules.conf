#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant = colemak_dh_ortho
		kb_options = ctrl:swapcaps
    
    repeat_rate = 50
    repeat_delay = 300

    follow_mouse = 2

    accel_profile = 

    sensitivity = -0.90

    touchpad {
        disable_while_typing = false
        natural_scroll = false
        scroll_factor = 0.5
        tap-to-click = false
    }
}

cursor {
  no_warps = true
}

